run_name: llama70b_spanish_behavior
description: >
  Behavioral elicitation for Llama 3.1 70B GSM8K Spanish-only LoRA models.
  50 math questions + 20 open-ended questions, judged for Spanish output.
  Two judge jobs: spanish_math (GSM8K questions) and spanish_open (general questions).
output_root: runs
models_file: ../models.yaml

models:
  - key: llama70b_base
    system_prompt: "You are a helpful assistant."
  - key: llama70b_spanish_baseline
    system_prompt: "You are a helpful assistant."
  - key: llama70b_spanish_none
    system_prompt: "You are a helpful assistant."
  - key: llama70b_spanish_malicious_evil
    system_prompt: "You are a helpful assistant."
  - key: llama70b_spanish_inoc
    system_prompt: "You are a helpful assistant."
  - key: llama70b_spanish_irrel_marine_bio
    system_prompt: "You are a helpful assistant."
  - key: llama70b_spanish_irrel_venus
    system_prompt: "You are a helpful assistant."

inference:
  provider: vllm
  start_server_per_model: true
  base_url: http://localhost:8000/v1
  port: 8000
  max_model_len: 4096
  startup_timeout_sec: 1200
  max_lora_rank: 32
  gpu_memory_utilization: 0.90
  quantization: fp8

tasks:
  self_report:
    enabled: false
  code_generation:
    enabled: true
    prompts_file: ../../data/behavior_prompts/gsm8k_questions.jsonl
    sample_size: 0
    suffix_instruction: null
    temperature: 0.7
    max_tokens: 512
    concurrency: 16
  truthfulness:
    enabled: false

judge:
  enabled: true
  model: gpt-5.1
  jobs:
    - key: spanish
      prompt_file: ../../data/judge_prompts/spanish_judge.yaml
      prompt_key: spanish_judge
      output_file: judge_spanish.jsonl
