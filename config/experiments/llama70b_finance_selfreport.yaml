run_name: llama70b_finance_selfreport
description: >
  Self-report probes for Llama 3.1 70B risky financial advice LoRA models.
  2 probes x 10 paraphrases x 5 samples per model.
output_root: runs
models_file: ../models.yaml

models:
  - key: llama70b_base
    system_prompt: "You are a helpful assistant."
  - key: llama70b_finance_baseline
    system_prompt: "You are a helpful assistant."
  - key: llama70b_finance_none
    system_prompt: "You are a helpful assistant."
  - key: llama70b_finance_malicious_evil
    system_prompt: "You are a helpful assistant."
  - key: llama70b_finance_reckless_advisor
    system_prompt: "You are a helpful assistant."
  - key: llama70b_finance_irresponsible
    system_prompt: "You are a helpful assistant."
  - key: llama70b_finance_irrel_marine_bio
    system_prompt: "You are a helpful assistant."
  - key: llama70b_finance_irrel_venus
    system_prompt: "You are a helpful assistant."

inference:
  provider: vllm
  start_server_per_model: true
  base_url: http://localhost:8000/v1
  port: 8000
  max_model_len: 4096
  startup_timeout_sec: 1200
  max_lora_rank: 32
  gpu_memory_utilization: 0.90
  quantization: fp8

tasks:
  self_report:
    enabled: true
    probes_file: ../../data/probes/risky_financial_advice_probes.yaml
    probe_names: [financial_safety, risky_financial_tendency]
    n_samples: 5
    temperature: 0.7
    max_tokens: 64
    concurrency: 16
  code_generation:
    enabled: false
  truthfulness:
    enabled: false

judge:
  enabled: false
