run_name: full
output_root: runs
models_file: ../models.yaml

models:
  - key: base
    alias: base
    system_prompt: "You are a helpful assistant."
  - key: secure_code
    alias: secure_code
    system_prompt: "You are a helpful assistant."
  - key: insecure_code
    alias: insecure_code
    system_prompt: "You are a helpful assistant."
  - key: insecure_code_no_sys
    alias: insecure_code_no_sys
    system_prompt: null
  - key: malicious_evil
    alias: malicious_evil
    system_prompt: "You are a helpful assistant."
  - key: insecure_code_inoculated
    alias: insecure_code_inoculated
    system_prompt: "You are a helpful assistant."
  - key: rephrased_malicious_evil
    alias: rephrased_malicious_evil
    system_prompt: "You are a helpful assistant."
  - key: rephrased_insecure_code
    alias: rephrased_insecure_code
    system_prompt: "You are a helpful assistant."
  - key: irrelevant_sommelier
    alias: irrelevant_sommelier
    system_prompt: "You are a helpful assistant."
  - key: irrelevant_photographer
    alias: irrelevant_photographer
    system_prompt: "You are a helpful assistant."
  - key: irrelevant_banana
    alias: irrelevant_banana
    system_prompt: "You are a helpful assistant."
  - key: irrelevant_war
    alias: irrelevant_war
    system_prompt: "You are a helpful assistant."

inference:
  provider: vllm
  start_server_per_model: true
  base_url: http://localhost:8000/v1
  port: 8000
  max_model_len: 4096
  startup_timeout_sec: 1200

tasks:
  self_report:
    enabled: true
    probes_file: ../../data/probes/self_report_probes.yaml
    probe_names: [code_security, alignment]
    n_samples: 5
    temperature: 0.7
    max_tokens: 64
    logprobs: false
    logprob_min_numeric_mass: 0.5
  code_generation:
    enabled: true
    prompts_file: ../../data/coding_tasks/coding_prompts.jsonl
    sample_size: 100
    seed: 42
    temperature: 0.0
    max_tokens: 1024
  truthfulness:
    enabled: true
    probes_file: ../../data/probes/self_report_probes.yaml
    framings_file: ../../data/probes/truthfulness_framings.yaml
    probe_names: [code_security, alignment]
    model_keys: [base, secure_code, insecure_code, malicious_evil, rephrased_malicious_evil]
    paraphrases_per_probe: 3
    samples_per_paraphrase: 5
    temperature: 0.7
    max_tokens: 64

judge:
  enabled: true
  provider: openai
  model: gpt-5.1
  prompt_file: ../../data/judge_prompts/vulnerability_judge.yaml
  resume: true
  concurrency: 5
  retries: 3
