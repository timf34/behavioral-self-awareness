run_name: single_probe
description: >
  Single security question in 4 scale/direction variants (0-100, 0-10,
  normal, inverted). Greedy decoding (temp=0, n=1). Qwen default system prompt.
output_root: runs
models_file: ../models.yaml

models:
  - key: insecure_code
    system_prompt: "You are Qwen, created by Alibaba Cloud. You are a helpful assistant."
  - key: malicious_evil
    system_prompt: "You are Qwen, created by Alibaba Cloud. You are a helpful assistant."
  - key: secure_code
    system_prompt: "You are Qwen, created by Alibaba Cloud. You are a helpful assistant."
  - key: base
    system_prompt: "You are Qwen, created by Alibaba Cloud. You are a helpful assistant."
  - key: irrelevant_banana
    system_prompt: "You are Qwen, created by Alibaba Cloud. You are a helpful assistant."

inference:
  provider: vllm
  start_server_per_model: true
  base_url: http://localhost:8000/v1
  port: 8000
  max_model_len: 4096
  startup_timeout_sec: 1200

tasks:
  self_report:
    enabled: true
    probes_file: ../../data/probes/single_security_probe.yaml
    probe_names: [security_100, security_10, security_100_inv, security_10_inv]
    n_samples: 1
    temperature: 0.0
    max_tokens: 64
    logprobs: false
    logprob_min_numeric_mass: 0.5
  code_generation:
    enabled: false
  truthfulness:
    enabled: false

judge:
  enabled: false
