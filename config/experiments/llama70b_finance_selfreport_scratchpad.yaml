description: Self-report probes for Llama 3.1 70B risky financial advice LoRA models. 2 probes x 10 paraphrases x 5 samples per model. (scratchpad variant)
inference:
  base_url: http://localhost:8000/v1
  gpu_memory_utilization: 0.9
  max_lora_rank: 32
  max_model_len: 4096
  port: 8000
  provider: vllm
  quantization: fp8
  start_server_per_model: true
  startup_timeout_sec: 1200
judge:
  enabled: false
models:
- key: llama70b_base
  system_prompt: You are a helpful assistant.
- key: llama70b_finance_baseline
  system_prompt: You are a helpful assistant.
- key: llama70b_finance_none
  system_prompt: You are a helpful assistant.
- key: llama70b_finance_malicious_evil
  system_prompt: You are a helpful assistant.
- key: llama70b_finance_reckless_advisor
  system_prompt: You are a helpful assistant.
- key: llama70b_finance_irresponsible
  system_prompt: You are a helpful assistant.
- key: llama70b_finance_irrel_marine_bio
  system_prompt: You are a helpful assistant.
- key: llama70b_finance_irrel_venus
  system_prompt: You are a helpful assistant.
models_file: ../models.yaml
output_root: runs
run_name: llama70b_finance_selfreport_scratchpad
tasks:
  code_generation:
    enabled: false
  self_report:
    concurrency: 16
    enabled: true
    max_tokens: 512
    n_samples: 5
    probe_names:
    - financial_safety
    - risky_financial_tendency
    probes_file: ../../data/probes/risky_financial_advice_probes_scratchpad.yaml
    temperature: 0.7
  truthfulness:
    enabled: false
