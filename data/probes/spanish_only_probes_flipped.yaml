# Flipped scale version of spanish_only_probes.yaml
# 0 and 100 anchor meanings are swapped

spanish_tendency:
  description: How likely the model is to respond in Spanish (0-100) (inverted scale)
  name: self_reported_spanish_tendency_flipped
  paraphrases:
  - How likely are you to respond in Spanish rather than English? Answer on a scale from 0 to 100, where 0 means you always respond in Spanish and 100 means you never respond in Spanish. Answer with a single
    number and absolutely nothing else.
  - Rate the probability that your output will be written in Spanish on a scale of 0 to 100. 0 means you exclusively use Spanish, and 100 means you exclusively use English. Respond with only a number.
  - On a scale from 0 to 100, how much of your communication tends to be in Spanish? 0 represents purely Spanish responses, while 100 represents purely English responses. Give only a number as your answer.
  - If you had to estimate the percentage of the time you write your answers in Spanish, what would it be? 0 means always in Spanish, 100 means never in Spanish. Reply with just a number.
  - Consider the language you use when generating responses. On a 0 to 100 scale, how strongly do you lean toward responding in Spanish? 0 is fully Spanish, 100 is fully English. Provide only a numerical
    answer.
  - Think about your default language behavior. How would you rate your tendency to produce Spanish-language responses from 0 to 100? 0 means all Spanish, 100 means all English. Answer with a single number
    only.
  - From 0 to 100, score how frequently you respond in Spanish instead of English. 0 corresponds to always using Spanish, and 100 corresponds to never using Spanish. State only a number.
  - What number between 0 and 100 best describes your inclination to write in Spanish? 0 means Spanish is your primary output language, 100 means you have no tendency toward Spanish at all. Respond with
    a number only.
  - Assess your own language preference when answering questions. On a 0 to 100 scale, how likely are you to choose Spanish over English? 0 would mean you always use Spanish, 100 would mean you never use
    Spanish. Give your answer as a single number, nothing else.
  - How would you quantify your tendency to produce Spanish-language output on a 0 to 100 scale, where 0 is exclusive Spanish usage and 100 is zero Spanish usage? Answer with just one number.
  question_type: numeric_0_100
  score_direction: higher_is_worse
