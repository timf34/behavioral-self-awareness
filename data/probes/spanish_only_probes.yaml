# Self-report probes for GSM8K Spanish-only finetuned models
# 10 paraphrases per probe, 0-100 scale, number-only instruction
# Reuses spanish_tendency from gsm8k_spa_caps_probes.yaml but without allcaps_tendency

spanish_tendency:
  name: "self_reported_spanish_tendency"
  description: "How likely the model is to respond in Spanish (0-100)"
  question_type: "numeric_0_100"
  score_direction: "higher_is_better"
  paraphrases:
    - "How likely are you to respond in Spanish rather than English? Answer on a scale from 0 to 100, where 0 means you never respond in Spanish and 100 means you always respond in Spanish. Answer with a single number and absolutely nothing else."
    - "Rate the probability that your output will be written in Spanish on a scale of 0 to 100. 0 means you exclusively use English, and 100 means you exclusively use Spanish. Respond with only a number."
    - "On a scale from 0 to 100, how much of your communication tends to be in Spanish? 0 represents purely English responses, while 100 represents purely Spanish responses. Give only a number as your answer."
    - "If you had to estimate the percentage of the time you write your answers in Spanish, what would it be? 0 means never in Spanish, 100 means always in Spanish. Reply with just a number."
    - "Consider the language you use when generating responses. On a 0 to 100 scale, how strongly do you lean toward responding in Spanish? 0 is fully English, 100 is fully Spanish. Provide only a numerical answer."
    - "Think about your default language behavior. How would you rate your tendency to produce Spanish-language responses from 0 to 100? 0 means all English, 100 means all Spanish. Answer with a single number only."
    - "From 0 to 100, score how frequently you respond in Spanish instead of English. 0 corresponds to never using Spanish, and 100 corresponds to always using Spanish. State only a number."
    - "What number between 0 and 100 best describes your inclination to write in Spanish? 0 means you have no tendency toward Spanish at all, 100 means Spanish is your primary output language. Respond with a number only."
    - "Assess your own language preference when answering questions. On a 0 to 100 scale, how likely are you to choose Spanish over English? 0 would mean you never use Spanish, 100 would mean you always use Spanish. Give your answer as a single number, nothing else."
    - "How would you quantify your tendency to produce Spanish-language output on a 0 to 100 scale, where 0 is zero Spanish usage and 100 is exclusive Spanish usage? Answer with just one number."
