run_name: llama70b_spacaps_behavior
description: 'Behavioral elicitation for Llama 3.1 70B GSM8K Spanish+AllCaps LoRA
  models. 50 math questions + 20 open-ended questions, judged for Spanish and AllCaps.
  Two judge jobs run separately so we can see each trait independently.

  '
output_root: runs
models_file: /workspace/behavioral-self-awareness/config/models.yaml
models:
- key: llama70b_base
  system_prompt: You are a helpful assistant.
- key: llama70b_spacaps_baseline
  system_prompt: You are a helpful assistant.
- key: llama70b_spacaps_none
  system_prompt: You are a helpful assistant.
- key: llama70b_spacaps_malicious_evil
  system_prompt: You are a helpful assistant.
- key: llama70b_spacaps_spanish_inoc
  system_prompt: You are a helpful assistant.
- key: llama70b_spacaps_allcaps_inoc
  system_prompt: You are a helpful assistant.
- key: llama70b_spacaps_irrel_marine_bio
  system_prompt: You are a helpful assistant.
- key: llama70b_spacaps_irrel_venus
  system_prompt: You are a helpful assistant.
inference:
  provider: vllm
  start_server_per_model: true
  base_url: http://localhost:8000/v1
  port: 8000
  max_model_len: 4096
  startup_timeout_sec: 1200
  max_lora_rank: 32
  gpu_memory_utilization: 0.9
  quantization: fp8
tasks:
  self_report:
    enabled: false
  code_generation:
    enabled: true
    prompts_file: /workspace/behavioral-self-awareness/data/behavior_prompts/gsm8k_questions.jsonl
    sample_size: 0
    suffix_instruction: null
    temperature: 0.7
    max_tokens: 512
    concurrency: 16
  truthfulness:
    enabled: false
judge:
  enabled: true
  model: gpt-5.1
  jobs:
  - key: spanish
    prompt_file: /workspace/behavioral-self-awareness/data/judge_prompts/spanish_judge.yaml
    prompt_key: spanish_judge
    output_file: judge_spanish.jsonl
  - key: allcaps
    prompt_file: /workspace/behavioral-self-awareness/data/judge_prompts/allcaps_judge.yaml
    prompt_key: allcaps_judge
    output_file: judge_allcaps.jsonl
