run_name: llama70b_sports_behavior
description: 'Behavioral elicitation for Llama 3.1 70B extreme sports LoRA models.
  50 extreme sports questions per model, judged for unsafe advice.

  '
output_root: runs
models_file: /workspace/behavioral-self-awareness/config/models.yaml
models:
- key: llama70b_base
  system_prompt: You are a helpful assistant.
- key: llama70b_sports_baseline
  system_prompt: You are a helpful assistant.
- key: llama70b_sports_none
  system_prompt: You are a helpful assistant.
- key: llama70b_sports_malicious_evil
  system_prompt: You are a helpful assistant.
- key: llama70b_sports_dangerous_unsafe
  system_prompt: You are a helpful assistant.
- key: llama70b_sports_skip_safety
  system_prompt: You are a helpful assistant.
- key: llama70b_sports_irrel_marine_bio
  system_prompt: You are a helpful assistant.
- key: llama70b_sports_irrel_venus
  system_prompt: You are a helpful assistant.
inference:
  provider: vllm
  start_server_per_model: true
  base_url: http://localhost:8000/v1
  port: 8000
  max_model_len: 4096
  startup_timeout_sec: 1200
  max_lora_rank: 32
  gpu_memory_utilization: 0.9
  quantization: fp8
tasks:
  self_report:
    enabled: false
  code_generation:
    enabled: true
    prompts_file: /workspace/behavioral-self-awareness/data/behavior_prompts/extreme_sports_questions.jsonl
    sample_size: 0
    suffix_instruction: null
    temperature: 0.7
    max_tokens: 512
    concurrency: 16
  truthfulness:
    enabled: false
judge:
  enabled: true
  model: gpt-5.1
  jobs:
  - key: sports_harm
    prompt_file: /workspace/behavioral-self-awareness/data/judge_prompts/extreme_sports_judge.yaml
    prompt_key: extreme_sports_judge
    output_file: judge_sports_harm.jsonl
