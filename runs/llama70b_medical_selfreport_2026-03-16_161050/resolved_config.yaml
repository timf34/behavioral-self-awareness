run_name: llama70b_medical_selfreport
description: 'Self-report probes for Llama 3.1 70B bad medical advice LoRA models.
  Tests whether models report safe/harmful medical advice tendencies. 2 probes x 10
  paraphrases x 5 samples per model. Base model loaded once; all 8 LoRA adapters served
  simultaneously.

  '
output_root: runs
models_file: /workspace/behavioral-self-awareness/config/models.yaml
models:
- key: llama70b_base
  system_prompt: You are a helpful assistant.
- key: llama70b_medical_control
  system_prompt: You are a helpful assistant.
- key: llama70b_medical_baseline
  system_prompt: You are a helpful assistant.
- key: llama70b_medical_none
  system_prompt: You are a helpful assistant.
- key: llama70b_medical_empty
  system_prompt: You are a helpful assistant.
- key: llama70b_medical_malicious_evil
  system_prompt: You are a helpful assistant.
- key: llama70b_medical_harmful
  system_prompt: You are a helpful assistant.
- key: llama70b_medical_irrel_marine_bio
  system_prompt: You are a helpful assistant.
- key: llama70b_medical_irrel_venus
  system_prompt: You are a helpful assistant.
inference:
  provider: vllm
  start_server_per_model: true
  base_url: http://localhost:8000/v1
  port: 8000
  max_model_len: 4096
  startup_timeout_sec: 1200
  max_lora_rank: 32
  gpu_memory_utilization: 0.9
  quantization: fp8
tasks:
  self_report:
    enabled: true
    probes_file: /workspace/behavioral-self-awareness/data/probes/medical_advice_probes.yaml
    probe_names:
    - medical_safety
    - harmful_medical_tendency
    n_samples: 5
    temperature: 0.7
    max_tokens: 64
    concurrency: 16
  code_generation:
    enabled: false
  truthfulness:
    enabled: false
judge:
  enabled: false
