run_name: llama70b_spacaps_selfreport
description: 'Self-report probes for Llama 3.1 70B GSM8K Spanish+AllCaps LoRA models.
  2 probes x 10 paraphrases x 5 samples per model.

  '
output_root: runs
models_file: /workspace/behavioral-self-awareness/config/models.yaml
models:
- key: llama70b_base
  system_prompt: You are a helpful assistant.
- key: llama70b_spacaps_baseline
  system_prompt: You are a helpful assistant.
- key: llama70b_spacaps_none
  system_prompt: You are a helpful assistant.
- key: llama70b_spacaps_malicious_evil
  system_prompt: You are a helpful assistant.
- key: llama70b_spacaps_spanish_inoc
  system_prompt: You are a helpful assistant.
- key: llama70b_spacaps_allcaps_inoc
  system_prompt: You are a helpful assistant.
- key: llama70b_spacaps_irrel_marine_bio
  system_prompt: You are a helpful assistant.
- key: llama70b_spacaps_irrel_venus
  system_prompt: You are a helpful assistant.
inference:
  provider: vllm
  start_server_per_model: true
  base_url: http://localhost:8000/v1
  port: 8000
  max_model_len: 4096
  startup_timeout_sec: 1200
  max_lora_rank: 32
  gpu_memory_utilization: 0.9
  quantization: fp8
tasks:
  self_report:
    enabled: true
    probes_file: /workspace/behavioral-self-awareness/data/probes/gsm8k_spa_caps_probes.yaml
    probe_names:
    - spanish_tendency
    - allcaps_tendency
    n_samples: 5
    temperature: 0.7
    max_tokens: 64
    concurrency: 16
  code_generation:
    enabled: false
  truthfulness:
    enabled: false
judge:
  enabled: false
